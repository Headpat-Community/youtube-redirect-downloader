<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Video Downloader</title>
    <meta name="description" content="Download YouTube videos and get direct MP4 links for VRChat and other platforms." />
    <meta name="theme-color" content="#0f0f0f" />
    <meta name="color-scheme" content="dark" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="YouTube Video Downloader" />
    <meta property="og:description" content="Download YouTube videos and get direct MP4 links for VRChat and other platforms." />
    <meta property="og:site_name" content="YouTube Video Downloader" />

    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>YouTube Video Downloader</h1>
        <p class="subtitle">Download videos for VRChat and more</p>
      </header>

      <section class="download-form">
        <form id="downloadForm">
          <div class="input-group">
            <input
              type="url"
              id="urlInput"
              placeholder="Paste YouTube URL here..."
              required
              autocomplete="off"
            />
            <button type="submit" id="submitBtn">Download</button>
          </div>
        </form>
      </section>

      <section id="progressSection" class="progress-section hidden">
        <div class="card">
          <h3 id="progressTitle">Starting download...</h3>
          <div class="status-row">
            <span class="status-badge" id="statusBadge">pending</span>
            <span id="progressPercent">0%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </section>

      <section id="resultSection" class="result-section hidden">
        <div class="card result-card">
          <h3 id="resultTitle">Video Ready</h3>
          <div class="link-group">
            <label>Direct Link</label>
            <div class="copy-row">
              <input type="text" id="directLink" readonly />
              <button class="copy-btn" data-target="directLink" type='button'>Copy</button>
            </div>
          </div>
          <p class="expires-text" id="expiresText"></p>
        </div>
      </section>

      <section id="errorSection" class="error-section hidden">
        <div class="card error-card">
          <h3>Download Failed</h3>
          <p id="errorMessage"></p>
        </div>
      </section>

      <section class="recent-section">
        <h2>Recent Downloads</h2>
        <div id="recentList" class="recent-list">
          <p class="empty-state">No downloads yet</p>
        </div>
      </section>

      <footer>
        <p>Hosted with <span class="heart">&hearts;</span> in the EU</p>
        <p class="disclaimer">Videos are automatically deleted after <span id="ttlValue">--</span> hours.</p>
        <p class="github-link"><a href="https://github.com/Headpat-Community/youtube-redirect-downloader" target="_blank" rel="noopener noreferrer">GitHub</a></p>
      </footer>
    </div>

    <script src="/app.js?v=3"></script>
  </body>
</html>
